    <link rel="apple-touch-icon" href="https://res.oplist.org/logo/logo.png" />
    <link
      rel="shortcut icon"
      type="image/ico"
      href="https://res.oplist.org/logo/logo.svg"
    />
    <title>Loading...</title>
    <script>
      window.OPENLIST_CONFIG = {
        cdn: undefined,
        base_path: undefined,
        api: undefined,
        main_color: undefined,
      }
      function normalizeDynamicBase(value) {
        if (!value) return ""
        var base = String(value).trim()
        if (!base) return ""
        if (/^https?:\/{0,2}$/i.test(base)) return ""
        if (/^https?:\/(?!\/)/i.test(base)) return ""
        try {
          var url = new URL(base, window.location.origin)
          if (/^https?:\/\//i.test(base) && !url.host) return ""
        } catch (_) {
          return ""
        }
        return base.replace(/\/+$/, "")
      }
      window.__dynamic_base__ = normalizeDynamicBase(window.OPENLIST_CONFIG.cdn)
    </script>
  </head>
